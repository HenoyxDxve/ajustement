<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <!-- Moov dark blue background -->
  <rect width="120" height="40" rx="8" fill="#0057A8"/>
  <!-- M letter mark -->
  <rect x="6" y="8" width="4" height="24" rx="2" fill="#FFFFFF"/>
  <rect x="6" y="8" width="18" height="4" rx="2" fill="#FFFFFF"/>
  <rect x="20" y="8" width="4" height="14" rx="2" fill="#FFFFFF"/>
  <rect x="20" y="8" width="4" height="24" rx="2" fill="#FFFFFF"/>
  <!-- "Moov" text -->
  <text x="34" y="16" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#FFFFFF" letter-spacing="1">Moov</text>
  <!-- "Money" text smaller -->
  <text x="34" y="30" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="0.5">Money</text>
</svg>
