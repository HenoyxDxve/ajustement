<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <!-- MTN yellow background -->
  <rect width="120" height="40" rx="8" fill="#FFCC00"/>
  <!-- MTN logo circle - black -->
  <circle cx="20" cy="20" r="13" fill="#000000"/>
  <!-- MTN text yellow inside circle -->
  <text x="20" y="24" font-family="Arial, sans-serif" font-size="8" font-weight="900" fill="#FFCC00" text-anchor="middle" letter-spacing="0.5">MTN</text>
  <!-- "Mobile" label -->
  <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#000000">Mobile</text>
  <!-- "MoMo" label -->
  <text x="40" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="#000000">MoMo</text>
</svg>
