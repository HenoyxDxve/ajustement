  <!-- Visa logo style text -->
  <text x="8" y="27" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF" letter-spacing="-1" font-style="italic">VISA</text>
  <!-- Mastercard circles -->
  <circle cx="88" cy="20" r="12" fill="#EB001B"/>
  <circle cx="104" cy="20" r="12" fill="#F79E1B"/>
  <!-- Overlap blend -->
