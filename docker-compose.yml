version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: restodici-db
    restart: always
    environment:
      POSTGRES_USER: restodici_user
      POSTGRES_PASSWORD: restodici_password
      POSTGRES_DB: restodici_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: